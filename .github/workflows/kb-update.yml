name: Daily KB Context Update

on:
  schedule:
    - cron: '0 1 * * 1-5'   # 평일 오전 10시 KST (UTC+9)
  workflow_dispatch:          # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run KB updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}   # 없으면 Slack만 실행
        run: python scripts/update_kb_context.py

      - name: Commit changes
        run: |
          git config user.name "kb-bot"
          git config user.email "kb-bot@github-actions"
          git add Context/Topics/ scripts/.last_update
          git diff --staged --quiet || git commit -m "chore: daily KB context update $(date +%Y-%m-%d)"
          git push
